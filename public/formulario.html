<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Squado · Atualizar Dados</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0efea;min-height:100vh;color:#1a1a18}
.header{background:#0F6E56;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.logo{width:34px;height:34px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#0F6E56;flex-shrink:0}
.header-title{color:#fff;font-size:15px;font-weight:700;line-height:1.2}
.header-sub{color:#9FE1CB;font-size:11px}
.container{max-width:620px;margin:0 auto;padding:24px 16px 48px}
.card{background:#fff;border-radius:14px;padding:22px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.hero{display:flex;align-items:center;gap:16px}
.avatar{width:56px;height:56px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;text-transform:uppercase}
.hero-nome{font-size:20px;font-weight:800;color:#1a1a18;line-height:1.2}
.hero-cargo{font-size:13px;color:#5a5a56;margin-top:3px}
.info-bar{background:#E1F5EE;border:1px solid #9FE1CB;border-radius:10px;padding:12px 14px;font-size:12px;color:#064E3B;display:flex;gap:10px;align-items:flex-start;margin-bottom:20px}
.section-title{font-size:10px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.1em;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1.5px;background:#E1F5EE;border-radius:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.grid-2{grid-template-columns:1fr}}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#5a5a56;margin-bottom:5px}
.field input,.field textarea{width:100%;padding:10px 13px;border:1.5px solid #e4e3de;border-radius:9px;font-size:13px;color:#1a1a18;background:#fff;font-family:inherit;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.field input:focus,.field textarea:focus{outline:none;border-color:#0F6E56;box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.field input::placeholder,.field textarea::placeholder{color:#b0afab}
.field textarea{min-height:80px;resize:vertical;line-height:1.5}
.field-hint{font-size:11px;color:#9a9a94;margin-top:4px}
.btn-submit{width:100%;padding:15px;background:#0F6E56;color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover:not(:disabled){background:#085041}
.btn-submit:disabled{background:#9a9a94;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-submit.loading .spinner{display:block}
.btn-submit.loading .btn-text{display:none}
.state{min-height:55vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 20px}
.state-icon{font-size:56px;margin-bottom:16px}
.state-title{font-size:20px;font-weight:800;margin-bottom:8px}
.state-sub{font-size:14px;color:#5a5a56;line-height:1.7;max-width:360px}
.spinner-big{width:44px;height:44px;border:3px solid #E1F5EE;border-top-color:#0F6E56;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="logo">S</div>
  <div>
    <div class="header-title">Squado</div>
    <div class="header-sub">Formulário do Colaborador</div>
  </div>
</div>

<div class="container">
  <div id="app">
    <div class="card state">
      <div class="spinner-big"></div>
      <div style="font-size:14px;color:#5a5a56">Carregando...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://squado-api-936751823867.us-central1.run.app';
let _col = null, _token = null;

function toast(msg, dur=3500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(n){ const p=(n||'').split(' ').filter(Boolean); return p.length>=2?p[0][0]+p[p.length-1][0]:(p[0]||'?')[0]; }
function val(id){ return (document.getElementById(id)||{}).value||''; }

function showErr(t,m){
  document.getElementById('app').innerHTML=
    '<div class="card state"><div class="state-icon">⚠️</div>'+
    '<div class="state-title" style="color:#A32D2D">'+t+'</div>'+
    '<div class="state-sub">'+m+'</div></div>';
}

async function init(){
  const params = new URLSearchParams(window.location.search);
  _token = params.get('col');
  if(!_token){ showErr('Link inválido','Este link não contém as informações necessárias.<br>Solicite um novo link ao seu gestor.'); return; }

  // Validar expiração localmente
  try {
    const parts = atob(_token).split('|');
    if(parts[2] && Date.now()-parseInt(parts[2]) > 30*24*60*60*1000){
      showErr('Link expirado','Este link expirou após 30 dias.<br>Solicite um novo ao seu gestor.'); return;
    }
  } catch(e){}

  try {
    const res = await fetch(API+'/api/formulario/'+_token);
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      showErr(res.status===410?'Link expirado':'Link inválido', err.erro||'Solicite um novo link ao seu gestor.');
      return;
    }
    const data = await res.json();
    _col = data.colaborador;
    renderForm();
  } catch(e){
    showErr('Sem conexão','Não foi possível carregar seus dados.<br>Verifique a internet e tente novamente.');
  }
}

function renderForm(){
  const c=_col, p=c.perfil||{};
  const nome=c.nome||'Colaborador';
  const info=[c.nivel||c.cargo,c.area].filter(Boolean).join(' · ');

  document.getElementById('app').innerHTML=`
    <div class="card">
      <div class="hero">
        <div class="avatar">${initials(nome)}</div>
        <div>
          <div class="hero-nome">${esc(nome)}</div>
          ${info?`<div class="hero-cargo">${esc(info)}</div>`:''}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="info-bar">
        <span style="font-size:16px">🔒</span>
        <div><strong>Formulário pessoal e seguro.</strong> Preencha os campos que desejar. Seus dados serão salvos diretamente no sistema de gestão da equipe.</div>
      </div>

      <div class="section-title">📱 Contato</div>
      <div class="grid-2">
        <div class="field">
          <label for="f-email">Email pessoal</label>
          <input type="email" id="f-email" value="${esc(p.email)}" placeholder="seu@email.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label for="f-celular">Celular / WhatsApp</label>
          <input type="tel" id="f-celular" value="${esc(p.celular)}" placeholder="(51) 9 9999-9999" autocomplete="tel"/>
        </div>
      </div>

      <div class="section-title">📋 Dados Pessoais</div>
      <div class="grid-2">
        <div class="field">
          <label for="f-nasc">Data de Nascimento</label>
          <input type="date" id="f-nasc" value="${esc(p.nascimento)}"/>
        </div>
        <div class="field">
          <label for="f-cpf">CPF <span style="font-weight:400;opacity:.7">(opcional)</span></label>
          <input type="text" id="f-cpf" value="${esc(p.cpf)}" placeholder="000.000.000-00" inputmode="numeric"/>
        </div>
      </div>
      <div class="field">
        <label for="f-end">Endereço completo</label>
        <input type="text" id="f-end" value="${esc(p.endereco)}" placeholder="Rua, número, bairro, cidade — CEP" autocomplete="street-address"/>
      </div>

      <div class="section-title">🎓 Formação & Conhecimentos</div>
      <div class="field">
        <label for="f-form">Formação Acadêmica</label>
        <textarea id="f-form" placeholder="Ex: Técnico em Eletrônica – SENAI 2018&#10;Graduação em Engenharia Elétrica – PUCRS 2023">${esc(p.formacao)}</textarea>
        <div class="field-hint">Um curso por linha</div>
      </div>
      <div class="field">
        <label for="f-conhec">Certificações, Conhecimentos e Idiomas</label>
        <textarea id="f-conhec" placeholder="Ex: Habilitado para ensaios de imunidade conduzida&#10;Metrologia – INMETRO 2022&#10;Inglês intermediário&#10;Python básico">${esc(p.conhecimentos)}</textarea>
        <div class="field-hint">Um item por linha</div>
      </div>

      <div class="section-title">📝 Observações</div>
      <div class="field">
        <label for="f-obs">Informações adicionais <span style="font-weight:400;opacity:.7">(opcional)</span></label>
        <textarea id="f-obs" placeholder="Qualquer informação que queira compartilhar com seu gestor...">${esc(p.obs)}</textarea>
      </div>

      <button class="btn-submit" id="btn" onclick="salvar()">
        <span class="btn-text">💾&nbsp;&nbsp;Enviar dados</span>
        <div class="spinner"></div>
      </button>
    </div>`;

  // Máscara CPF
  document.getElementById('f-cpf').addEventListener('input',function(){
    let v=this.value.replace(/\D/g,'').slice(0,11);
    if(v.length>9) v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
    else if(v.length>6) v=v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
    else if(v.length>3) v=v.replace(/(\d{3})(\d{1,3})/,'$1.$2');
    this.value=v;
  });
}

async function salvar(){
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.classList.add('loading');

  const perfil={
    email:        val('f-email').trim(),
    celular:      val('f-celular').trim(),
    nascimento:   val('f-nasc'),
    cpf:          val('f-cpf').trim(),
    endereco:     val('f-end').trim(),
    formacao:     val('f-form').trim(),
    conhecimentos:val('f-conhec').trim(),
    obs:          val('f-obs').trim(),
  };

  try {
    const res=await fetch(API+'/api/formulario/'+_token,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({colId:_col.id, perfil})
    });
    if(res.ok){
      document.getElementById('app').innerHTML=
        '<div class="card state">'+
        '<div class="state-icon">✅</div>'+
        '<div class="state-title" style="color:#0F6E56">Dados enviados com sucesso!</div>'+
        '<div class="state-sub">Obrigado, <strong>'+esc(_col.nome.split(' ')[0])+'</strong>!<br><br>'+
        'Suas informações foram registradas no sistema.<br>Você já pode fechar esta página.</div>'+
        '</div>';
    } else {
      const err=await res.json().catch(()=>({}));
      toast('❌ '+(err.erro||'Erro ao salvar. Tente novamente.'));
      btn.disabled=false; btn.classList.remove('loading');
    }
  } catch(e){
    toast('❌ Sem conexão. Verifique a internet e tente novamente.');
    btn.disabled=false; btn.classList.remove('loading');
  }
}

init();
</script>
</body>
</html>
